<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; color: #fff; font-family: 'Inter', sans-serif; }
    a { text-decoration: none; color: inherit; }
    button { border: none; cursor: pointer; font-family: 'Inter', sans-serif; }

    /* Nav */
    #navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; align-items: center;
      padding: 25px 40px; height: 106px;
    }
    .nav-logo { width: 56px; height: 56px; flex-shrink: 0; }
    .nav-logo img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .nav-links {
      flex: 1; display: flex; gap: 40px;
      align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; white-space: nowrap;
    }
    .nav-links a { color: rgba(255,255,255,0.6); transition: color 0.2s; }
    .nav-links a.active { color: #fff; text-decoration: underline; text-underline-offset: 6px; }
    .nav-links a:hover { color: #fff; }
    .nav-social { display: flex; gap: 20px; align-items: center; }
    .nav-social a { color: #fff; transition: opacity 0.2s; display: flex; align-items: center; }
    .nav-social a:hover { opacity: 0.6; }

    /* Hamburger */
    .hamburger {
      display: none; width: 36px; height: 36px;
      background: none; flex-direction: column;
      align-items: center; justify-content: center; gap: 5px; z-index: 20; flex-shrink: 0;
    }
    .hamburger span { display: block; width: 22px; height: 2px; background: #fff; border-radius: 2px; transition: transform 0.3s, opacity 0.3s; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* Mobile menu */
    .mobile-menu {
      display: none; position: fixed; inset: 0; z-index: 9;
      background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);
      flex-direction: column; align-items: center; justify-content: center; gap: 32px;
      font-size: 24px; font-weight: 700;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a { color: #fff; transition: color 0.2s; }
    .mobile-menu a.active { text-decoration: underline; text-underline-offset: 6px; }
    .mobile-menu a:hover { color: #a1a1a1; }
    .mobile-menu-social { display: flex; gap: 24px; margin-top: 16px; }
    .mobile-menu-social a { color: #fff; display: flex; }

    /* ═══════════════════════════════════════════
       CAROUSEL
       ═══════════════════════════════════════════ */
    .carousel {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* Split columns */
    .carousel-col {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      overflow: hidden;
    }
    .carousel-col-left { left: 0; }
    .carousel-col-right { right: 0; }

    /* Track that moves vertically */
    .carousel-track {
      position: absolute;
      width: 100%;
      height: 500vh; /* 4 slides + 1 clone x 100vh */
      transition: transform 0.9s cubic-bezier(0.76, 0, 0.24, 1);
      will-change: transform;
    }

    /* Each slide panel within a track */
    .carousel-panel {
      width: 100%;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    /* Circular image container on each side */
    .carousel-circle {
      position: absolute;
      width: 44vw;
      height: 44vw;
      max-width: 640px;
      max-height: 640px;
      border-radius: 50%;
      overflow: hidden;
      top: 50%;
      transform: translateY(-58%);
    }
    .carousel-col-left .carousel-circle {
      right: -22vw;
    }
    .carousel-col-right .carousel-circle {
      left: -22vw;
    }
    @media (min-width: 1500px) {
      .carousel-col-left .carousel-circle { right: -320px; }
      .carousel-col-right .carousel-circle { left: -320px; }
    }
    .carousel-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Text overlay */
    .carousel-text {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 5;
      text-align: center;
      padding-bottom: 3vh;
      pointer-events: none;
    }
    .carousel-text-inner {
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .carousel-text-inner.fading {
      opacity: 0;
      transform: translateY(12px);
    }
    .carousel-greeting {
      font-size: 16px;
      font-weight: 500;
      color: rgba(255,255,255,0.85);
      margin-bottom: 8px;
    }
    .carousel-title {
      font-size: clamp(36px, 5.5vw, 72px);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 12px;
    }
    .carousel-subtitle {
      font-size: 16px;
      font-weight: 400;
      color: rgba(255,255,255,0.75);
      margin-bottom: 20px;
    }

    /* Controls */
    .carousel-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      pointer-events: auto;
    }
    .carousel-arrow {
      background: none;
      color: rgba(255,255,255,0.6);
      font-size: 18px;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
      pointer-events: auto;
    }
    .carousel-arrow:hover { color: #fff; }

    .carousel-dots {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .carousel-dot {
      width: 8px;
      height: 8px;
      border-radius: 4px;
      background: rgba(255,255,255,0.35);
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), background 0.4s ease;
      cursor: pointer;
      pointer-events: auto;
    }
    .carousel-dot.active {
      width: 32px;
      background: rgba(255,255,255,0.35);
    }

    /* Timer fill on active dot */
    .carousel-dot {
      position: relative;
      overflow: hidden;
    }
    .carousel-dot::after {
      content: '';
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 0%;
      background: #fff;
      border-radius: 4px;
    }
    .carousel-dot.active.timing::after {
      width: 100%;
      transition: width var(--timer-duration, 5s) linear;
    }

    /* Mobile */
    @media (max-width: 900px) {
      .hamburger { display: flex; }
      .nav-links, .nav-social { display: none; }
      #navbar { padding: 16px 20px; height: 60px; justify-content: space-between; }
      .nav-logo { width: 36px; height: 36px; }

      .carousel-circle {
        width: 70vw;
        height: 70vw;
        max-width: none;
        max-height: none;
        transform: translateY(-60%);
      }
      .carousel-col-left .carousel-circle { right: -35vw; }
      .carousel-col-right .carousel-circle { left: -35vw; }

      .carousel-greeting { font-size: 14px; }
      .carousel-subtitle { font-size: 14px; }
      .carousel-text { padding-bottom: 2.5vh; }
    }
  </style>

  <script>
    const SLIDES = [
      { title: 'Record time', subtitle: 'Music poser*. Ticket closer.' },
      { title: 'Say, \u201CCheese!\u201D', subtitle: "Forever snap happy and make pizza that ain\u2019t crappy" },
      { title: 'Work hard. Play hard.', subtitle: 'Not too formal and I play on Normal.' },
      { title: 'I\u2026 drive results?', subtitle: "I've run out of puns and rhymes\u2026 just scroll or click around" },
    ];

    const TOTAL = SLIDES.length;
    const AUTO_INTERVAL = 5000; // ms
    let current = 0;
    let autoTimer = null;
    let transitioning = false;

    const trackLeft = document.getElementById('track-left');
    const trackRight = document.getElementById('track-right');
    const textEl = document.getElementById('carousel-text');
    const titleEl = document.getElementById('carousel-title');
    const subtitleEl = document.getElementById('carousel-subtitle');
    const dotsContainer = document.getElementById('carousel-dots');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');

    // Build dots
    for (let i = 0; i < TOTAL; i++) {
      const dot = document.createElement('div');
      dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
      dot.addEventListener('click', () => goTo(i));
      dotsContainer.appendChild(dot);
    }

    function updateTracks(idx) {
      // Left track has a clone prepended, so positions shift by +1
      // Reversed: [clone, slide4, slide3, slide2, slide1]
      // slide 0 → DOM index 4 → translateY(-400vh)
      // slide 3 → DOM index 1 → translateY(-100vh)
      const leftOffset = (TOTAL - idx) * 100;
      trackLeft.style.transform = `translateY(-${leftOffset}vh)`;

      // Right track: [slide1, slide2, slide3, slide4, clone]
      const rightOffset = idx * 100;
      trackRight.style.transform = `translateY(-${rightOffset}vh)`;
    }

    function updateText(idx) {
      titleEl.textContent = SLIDES[idx].title;
      subtitleEl.textContent = SLIDES[idx].subtitle;
    }

    function updateDots(idx) {
      const dots = dotsContainer.querySelectorAll('.carousel-dot');
      dots.forEach((d, i) => {
        d.classList.toggle('active', i === idx);
        d.classList.remove('timing');
      });
      // Trigger timer animation on active dot
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          dots[idx].classList.add('timing');
        });
      });
    }

    function goTo(idx) {
      if (transitioning || idx === current) return;
      transitioning = true;

      const isForwardWrap = (current === TOTAL - 1 && idx === 0);

      // Fade out text
      textEl.classList.add('fading');

      if (isForwardWrap) {
        // Animate to clone positions (one step beyond last slide)
        // Left: continue DOWN from -100vh to 0vh (clone at top)
        trackLeft.style.transform = 'translateY(0vh)';
        // Right: continue UP from -300vh to -400vh (clone at bottom)
        trackRight.style.transform = `translateY(-${TOTAL * 100}vh)`;

        // After animation completes, snap to real slide 0 position
        setTimeout(() => {
          trackLeft.style.transition = 'none';
          trackRight.style.transition = 'none';
          updateTracks(0);
          // Force reflow then re-enable transition
          trackLeft.offsetHeight;
          trackRight.offsetHeight;
          trackLeft.style.transition = '';
          trackRight.style.transition = '';
        }, 920);
      } else {
        updateTracks(idx);
      }

      // After text fades, swap content and fade in
      setTimeout(() => {
        updateText(idx);
        textEl.classList.remove('fading');
      }, 400);

      // Update dots immediately
      updateDots(idx);

      current = idx;

      // Allow next transition after slide animation completes
      setTimeout(() => { transitioning = false; }, 950);

      resetAuto();
    }

    function next() {
      goTo((current + 1) % TOTAL);
    }

    function prev() {
      goTo((current - 1 + TOTAL) % TOTAL);
    }

    function resetAuto() {
      clearInterval(autoTimer);
      autoTimer = setInterval(next, AUTO_INTERVAL);
    }

    // Init
    prevBtn.addEventListener('click', prev);
    nextBtn.addEventListener('click', next);

    // Keyboard
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') prev();
      if (e.key === 'ArrowRight') next();
    });

    // Touch/swipe support
    let touchStartX = 0;
    document.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
    document.addEventListener('touchend', (e) => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 50) { dx < 0 ? next() : prev(); }
    }, { passive: true });

    // Set initial position
    updateTracks(0);
    updateDots(0);

    // Set timer duration CSS variable
    document.documentElement.style.setProperty('--timer-duration', AUTO_INTERVAL + 'ms');

    // Start auto-advance
    resetAuto();
  </script>
