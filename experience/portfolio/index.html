<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio — davidmccrindle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { width: 100%; min-height: 100vh; font-family: 'Inter', sans-serif; overflow-x: hidden; }
    a { text-decoration: none; color: inherit; }
    button { border: none; cursor: pointer; font-family: 'Inter', sans-serif; background: none; }

    /* ── Nav ─────────────────────────────────── */
    #navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      display: flex; align-items: center;
      padding: 25px 40px; height: 80px;
      transition: background 0.4s ease, color 0.3s ease;
    }

    /* Gallery mode: black text, white/transparent bg */
    #navbar.gallery-mode .nav-logo { color: #000; }
    #navbar.gallery-mode .nav-links a { color: rgba(0,0,0,0.45); }
    #navbar.gallery-mode .nav-links a.active { color: #000; text-decoration: underline; text-underline-offset: 6px; }
    #navbar.gallery-mode .nav-links a:hover { color: #000; }
    #navbar.gallery-mode .nav-social a { color: #000; }
    #navbar.gallery-mode .hamburger span { background: #000; }
    #navbar.gallery-mode.scrolled { background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }

    /* Case study mode: white text */
    #navbar.cs-mode .nav-logo { color: #fff; }
    #navbar.cs-mode .nav-links a { color: rgba(255,255,255,0.55); }
    #navbar.cs-mode .nav-links a.active { color: #fff; text-decoration: underline; text-underline-offset: 6px; }
    #navbar.cs-mode .nav-links a:hover { color: #fff; }
    #navbar.cs-mode .nav-social a { color: #fff; }
    #navbar.cs-mode .hamburger span { background: #fff; }
    #navbar.cs-mode.hero-mode { background: transparent; }
    #navbar.cs-mode.scrolled { background: rgba(10,10,10,0.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }

    .nav-logo { width: 48px; height: 48px; flex-shrink: 0; color: #000; }
    .nav-logo img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .nav-links { flex: 1; display: flex; gap: 40px; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; white-space: nowrap; }
    .nav-social { display: flex; gap: 20px; align-items: center; }
    .nav-social a { transition: opacity 0.2s; display: flex; align-items: center; }
    .nav-social a:hover { opacity: 0.6; }
    .hamburger { display: none; width: 36px; height: 36px; flex-direction: column; align-items: center; justify-content: center; gap: 5px; z-index: 60; flex-shrink: 0; }
    .hamburger span { display: block; width: 22px; height: 2px; border-radius: 2px; transition: transform 0.3s, opacity 0.3s; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .mobile-menu { display: none; position: fixed; inset: 0; z-index: 55; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); flex-direction: column; align-items: center; justify-content: center; gap: 32px; font-size: 24px; font-weight: 700; }
    .mobile-menu.open { display: flex; }
    .mobile-menu a { transition: color 0.2s; }
    .mobile-menu a.active { text-decoration: underline; text-underline-offset: 6px; }
    /* Gallery mobile menu */
    .mobile-menu.gallery-mob { background: rgba(255,255,255,0.97); color: #000; }
    .mobile-menu.gallery-mob a { color: #000; }
    /* CS mobile menu */
    .mobile-menu.cs-mob { background: rgba(0,0,0,0.97); color: #fff; }
    .mobile-menu.cs-mob a { color: #fff; }

    /* ── Auth Gate ───────────────────────────── */
    .auth-gate {
      position: fixed; inset: 0; z-index: 100;
      background: #0a0a0a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 40px;
    }
    .auth-gate.hidden { display: none; }
    .auth-gate .gate-icon {
      width: 72px; height: 72px;
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 28px;
    }
    .auth-gate h2 { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 10px; }
    .auth-gate p { font-size: 16px; color: rgba(255,255,255,0.45); margin-bottom: 32px; }
    .auth-gate a { color: #fff; text-decoration: underline; text-underline-offset: 4px; font-weight: 600; }

    /* ── Page visibility ─────────────────────── */
    .portfolio-page { display: none; }
    .portfolio-page.active { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ══════════════════════════════════════════
       GALLERY VIEW — white, two-column list
    ══════════════════════════════════════════ */
    .gallery-page {
      position: relative;
      min-height: 100vh;
      background: #fff;
      /* display controlled by .portfolio-page.active — do NOT set display: flex here
         or it overrides the "display: none" hiding rule */
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    /* Override .portfolio-page.active { display: block } with flex for gallery */
    .gallery-page.active {
      display: flex !important;
    }

    /* Rotating dot background */
    .circles-bg-wrap {
      position: absolute;
      /* Positioned on the right side, centered vertically */
      left: 42%;
      top: 50%;
      width: 1600px;
      height: 1600px;
      pointer-events: none;
      z-index: 0;
      transform: translate(0, -50%);
    }
    #dot-bg-svg {
      width: 100%;
      height: 100%;
      animation: rotateSlow 50s linear infinite;
      transform-origin: 50% 50%;
    }
    @keyframes rotateSlow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* Two-column content */
    .gallery-layout {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 48px;
      width: 100%;
      max-width: 1280px;
      padding: 100px 60px 60px; /* top padding clears fixed nav */
    }

    /* ── Left column: project list ─────────── */
    .project-list-col {
      flex: 1;
      min-width: 0; /* prevent flex overflow */
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* Navigation arrows */
    .list-arrow {
      width: 50px; height: 50px;
      border-radius: 50%;
      border: 1.5px solid #000;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      color: #000;
      transition: background 0.2s, color 0.2s, opacity 0.2s, border-color 0.2s;
    }
    .list-arrow:hover { background: #000; color: #fff; }
    .list-arrow.disabled { opacity: 0.18; pointer-events: none; }

    /* Viewport: shows exactly 4 rows */
    .list-viewport {
      width: 100%;
      height: 352px; /* 4 × 88px */
      overflow: hidden;
    }

    .list-track {
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Individual project row */
    .project-row {
      position: relative;
      height: 88px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 36px 0 0; /* right padding for arrow */
      border-bottom: 1px solid #e0e0e0;
      cursor: pointer;
      overflow: hidden;
    }
    .project-row:first-child {
      border-top: 1px solid #e0e0e0;
    }

    .row-eyebrow {
      font-size: 13px;
      font-weight: 600;
      color: #aaa;
      letter-spacing: 0.02em;
      margin-bottom: 4px;
      transition: color 0.25s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .row-title {
      font-size: 40px;
      font-weight: 700;
      color: #000;
      letter-spacing: -0.025em;
      line-height: 1.0;
      transition: transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Row hover arrow */
    .row-arrow-icon {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%) translateX(8px);
      opacity: 0;
      color: #000;
      transition: opacity 0.25s, transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94);
    }

    .project-row:hover .row-eyebrow { color: #666; }
    .project-row:hover .row-title { transform: translateX(10px); }
    .project-row:hover .row-arrow-icon { opacity: 1; transform: translateY(-50%) translateX(0); }

    /* Active (top) row — same size as others */
    .project-row.row-featured .row-eyebrow { font-size: 13px; }
    .project-row.row-featured .row-title { font-size: 40px; }

    /* ── Right column: featured image ──────── */
    .featured-col {
      width: 616px;
      height: 616px;
      flex-shrink: 0;
      position: relative;
    }

    .featured-card {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      overflow: hidden;
      background: #e8e8e8;
      /* Hidden until user hovers a row */
      opacity: 0;
      transition: opacity 0.35s ease;
    }
    .featured-card.visible {
      opacity: 1;
    }
    .featured-card img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ══════════════════════════════════════════
       CASE STUDY VIEW — dark
    ══════════════════════════════════════════ */
    .cs-page { background: #0a0a0a; color: #fff; }

    /* Back button */
    .cs-back-bar {
      position: fixed; top: 80px; left: 0; right: 0;
      z-index: 40; padding: 16px 40px; pointer-events: none;
    }
    .cs-back {
      pointer-events: all;
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 700;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.03em;
      transition: color 0.2s;
    }
    .cs-back:hover { color: #fff; }

    /* Hero image */
    .cs-hero-wrap {
      position: relative; width: 100%; margin-top: 80px;
      height: 70vh; min-height: 400px; max-height: 700px; overflow: hidden;
    }
    .cs-hero-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .cs-hero-gradient {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(10,10,10,0) 40%, rgba(10,10,10,0.6) 75%, rgba(10,10,10,1) 100%);
    }

    /* Intro block */
    .cs-intro {
      max-width: 1100px; margin: 0 auto; padding: 48px 60px 0;
      opacity: 0; animation: fadeUp 0.7s 0.1s forwards;
    }
    .cs-company-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 16px;
    }
    .cs-title {
      font-size: clamp(44px, 6vw, 80px); font-weight: 800;
      line-height: 1.0; letter-spacing: -0.035em; margin-bottom: 20px;
    }
    .cs-subtitle {
      font-size: 20px; line-height: 1.6; color: rgba(255,255,255,0.5);
      max-width: 700px; margin-bottom: 28px;
    }
    .cs-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 56px; }
    .cs-tag {
      font-size: 11px; font-weight: 700; padding: 5px 14px; border-radius: 20px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.5); letter-spacing: 0.04em;
    }

    /* Lead paragraph */
    .cs-lead {
      max-width: 1100px; margin: 0 auto; padding: 0 60px 64px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      opacity: 0; animation: fadeUp 0.7s 0.25s forwards;
    }
    .cs-lead p {
      font-size: clamp(18px, 2vw, 22px); font-weight: 600;
      line-height: 1.65; color: rgba(255,255,255,0.82); max-width: 800px;
    }

    /* Two-column body */
    .cs-body {
      max-width: 1100px; margin: 0 auto; padding: 0 60px;
      display: grid; grid-template-columns: 260px 1fr; gap: 0 60px; min-height: 500px;
    }

    /* Accordion */
    .cs-accordion { padding: 56px 0; position: sticky; top: 80px; align-self: start; height: fit-content; }
    .accordion-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
      cursor: pointer; transition: all 0.2s;
    }
    .accordion-item:first-child { border-top: 1px solid rgba(255,255,255,0.06); }
    .accordion-title { font-size: 15px; font-weight: 700; color: rgba(255,255,255,0.35); transition: color 0.2s; line-height: 1.3; }
    .accordion-arrow { flex-shrink: 0; width: 18px; height: 18px; color: rgba(255,255,255,0.2); transition: color 0.2s, transform 0.2s; }
    .accordion-item.active .accordion-title { color: #fff; }
    .accordion-item.active .accordion-arrow { color: rgba(255,255,255,0.7); transform: rotate(90deg); }
    .accordion-item:hover .accordion-title { color: rgba(255,255,255,0.7); }
    .accordion-item:hover .accordion-arrow { color: rgba(255,255,255,0.4); }

    /* Panel */
    .cs-panel { padding: 56px 0; border-left: 1px solid rgba(255,255,255,0.07); padding-left: 60px; min-height: 400px; }
    .panel-section { display: none; }
    .panel-section.active { display: block; animation: fadeUp 0.45s ease forwards; }
    .panel-section h3 { font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 24px; }
    .panel-section p { font-size: 16px; line-height: 1.85; color: rgba(255,255,255,0.6); margin-bottom: 18px; }
    .panel-section p:last-child { margin-bottom: 0; }
    .panel-section h4 { font-size: 17px; font-weight: 700; color: rgba(255,255,255,0.9); margin: 28px 0 10px; }
    .panel-section ul { list-style: none; padding: 0; margin: 0; }
    .panel-section ul li {
      font-size: 16px; line-height: 1.8; color: rgba(255,255,255,0.6);
      padding: 10px 0 10px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); position: relative;
    }
    .panel-section ul li::before {
      content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
      width: 6px; height: 6px; background: rgba(255,255,255,0.3); border-radius: 50%;
    }
    .outcomes-list li { font-weight: 500; color: rgba(255,255,255,0.75) !important; }

    /* Carousel */
    .cs-gallery {
      max-width: 1100px; margin: 0 auto; padding: 64px 60px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    .gallery-label { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 28px; }
    .carousel-wrap { position: relative; }
    .carousel-track { display: flex; gap: 16px; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; -ms-overflow-style: none; scroll-behavior: smooth; }
    .carousel-track::-webkit-scrollbar { display: none; }
    .carousel-slide { flex: 0 0 auto; width: calc(70% - 8px); scroll-snap-align: start; border-radius: 12px; overflow: hidden; background: #111; }
    .carousel-slide img { width: 100%; height: 400px; object-fit: cover; display: block; }
    .carousel-controls { display: flex; align-items: center; justify-content: space-between; margin-top: 20px; }
    .carousel-dots { display: flex; gap: 8px; align-items: center; }
    .carousel-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.2); cursor: pointer; transition: background 0.2s, width 0.2s; }
    .carousel-dot.active { background: #fff; width: 20px; border-radius: 3px; }
    .carousel-arrows { display: flex; gap: 12px; }
    .carousel-btn { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s, color 0.2s; }
    .carousel-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .carousel-btn.disabled { opacity: 0.25; pointer-events: none; }

    /* Next project footer */
    .cs-next {
      position: relative; width: 100%; overflow: hidden; min-height: 360px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 80px 40px; margin-top: 80px; cursor: pointer;
    }
    .cs-next-bg { position: absolute; inset: 0; background-size: cover; background-position: center; filter: blur(12px) brightness(0.25); transform: scale(1.08); transition: filter 0.4s ease; }
    .cs-next:hover .cs-next-bg { filter: blur(10px) brightness(0.35); }
    .cs-next-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); }
    .cs-next-content { position: relative; z-index: 2; }
    .cs-next-label { font-size: 11px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 20px; }
    .cs-next-title { font-size: clamp(32px, 4.5vw, 58px); font-weight: 800; letter-spacing: -0.03em; line-height: 1.05; margin-bottom: 28px; }
    .cs-next-cta { display: inline-flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 700; color: rgba(255,255,255,0.7); border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 3px; transition: color 0.2s, border-color 0.2s; }
    .cs-next:hover .cs-next-cta { color: #fff; border-color: rgba(255,255,255,0.7); }

    .cs-end { text-align: center; padding: 80px 40px; margin-top: 80px; border-top: 1px solid rgba(255,255,255,0.07); }
    .cs-end p { font-size: 15px; color: rgba(255,255,255,0.3); margin-bottom: 16px; }
    .cs-end a { font-size: 15px; font-weight: 700; color: rgba(255,255,255,0.6); display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s; }
    .cs-end a:hover { color: #fff; }

    /* ── Mobile ─────────────────────────────── */
    @media (max-width: 900px) {
      .hamburger { display: flex; }
      .nav-links, .nav-social { display: none; }
      #navbar { padding: 16px 20px; height: 64px; justify-content: space-between; }
      .nav-logo { width: 40px; height: 40px; }

      .gallery-layout {
        flex-direction: column;
        padding: 88px 24px 40px;
        gap: 32px;
      }
      .featured-col { display: none; }
      .list-viewport { height: 352px; } /* 4 rows on mobile */
      .row-title { font-size: 28px; }
      .project-row.row-featured .row-title { font-size: 32px; }

      .cs-hero-wrap { margin-top: 64px; height: 50vh; }
      .cs-intro { padding: 36px 24px 0; }
      .cs-title { font-size: clamp(36px, 8vw, 54px); }
      .cs-subtitle { font-size: 16px; }
      .cs-lead { padding: 0 24px 48px; }
      .cs-lead p { font-size: 17px; }
      .cs-body { grid-template-columns: 1fr; padding: 0 24px; }
      .cs-accordion { display: none; }
      .cs-panel { border-left: none; padding-left: 0; padding-top: 0; }
      .panel-section { display: block !important; margin-bottom: 40px; }
      .panel-section.active { animation: none; }
      .cs-gallery { padding: 48px 24px; }
      .carousel-slide { width: 85%; }
      .carousel-slide img { height: 260px; }
      .cs-back-bar { padding: 12px 20px; }
    }
  </style>
</head>
<body>
  <!-- Auth Gate -->
  <div class="auth-gate" id="auth-gate">
    <div class="gate-icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h2>Portfolio is locked</h2>
    <p>You need a password to view this content.</p>
    <div style="display:flex;gap:8px;margin-bottom:24px;">
      <input type="password" id="gate-pw" placeholder="Enter password" autocomplete="off"
        style="height:48px;padding:0 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.07);color:#fff;font-size:15px;font-family:inherit;outline:none;width:200px;">
      <button id="gate-btn" style="height:48px;padding:0 20px;border-radius:8px;background:rgba(255,0,217,0.85);color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;border:none;">Unlock</button>
    </div>
    <p id="gate-pw-error" style="font-size:14px;color:#ff4d4d;margin-bottom:16px;opacity:0;transition:opacity 0.2s;">That's not quite right. Try again.</p>
    <a href="/experience/">Go back to Experience</a>
  </div>

  <!-- Nav -->
  <nav id="navbar">
    <a class="nav-logo" href="/" style="display:flex;flex-shrink:0;">
      <svg width="48" height="48" viewBox="0 0 113 113" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M56.5 0C25.2862 0 0 25.2862 0 56.5C0 87.7138 25.2862 113 56.5 113C87.7138 113 113 87.7138 113 56.5C113 25.2862 87.7138 0 56.5 0ZM88.9143 88.9143H67.4173L88.8018 67.5299V88.9143H88.9143ZM88.9143 64.3972L64.3972 88.9143H45.9203L88.9143 45.9203V64.3972ZM88.9143 42.7877L42.7877 88.9143H24.0857L88.8018 24.0857V42.7689H88.9143V42.7877Z" fill="currentColor"/></svg>
    </a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/experience/" class="active">Experience</a>
      <a href="/concert-archive/">Concert Archive</a>
      <a href="/say-hi/">Say "Hi"</a>
    </div>
    <div class="nav-social">
      <a href="https://www.linkedin.com/in/davidmccrindle/" target="_blank" rel="noopener" aria-label="LinkedIn">

  <script type="module">
    import { projects } from '/js/portfolio-data.js';

    // ── Element refs ─────────────────────────────
    const authGate    = document.getElementById('auth-gate');
    const navbar      = document.getElementById('navbar');
    const hamburger   = document.getElementById('hamburger');
    const mobileMenu  = document.getElementById('mobile-menu');

    // ── State (must be before auth check so init() can use them) ──
    var currentSlug    = null;
    var carouselImages = [];
    var carouselIndex  = 0;
    var galleryPage    = 0;
    const PAGE_SIZE    = 4;
    const ROW_HEIGHT   = 88;
    var hoverTimeout   = null;

    // ── Hamburger ────────────────────────────────
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      mobileMenu.classList.toggle('open');
    });

    // ── Portfolio gate (direct access) ───────────
    const gatePwInput = document.getElementById('gate-pw');
    const gateBtn = document.getElementById('gate-btn');
    const gatePwError = document.getElementById('gate-pw-error');
    function checkGatePassword() {
      if (gatePwInput.value.toLowerCase().trim() === 'pizza') {
        sessionStorage.setItem('portfolio_auth', 'true');
        authGate.classList.add('hidden');
        document.body.style.overflow = '';
        init();
      } else {
        gatePwError.style.opacity = '1';
        gatePwInput.value = ''; gatePwInput.focus();
        setTimeout(() => { gatePwError.style.opacity = '0'; }, 3000);
      }
    }
    gateBtn.addEventListener('click', checkGatePassword);
    gatePwInput.addEventListener('keydown', e => { if (e.key === 'Enter') checkGatePassword(); });

    // ── Auth check ──────────────────────────────
    if (sessionStorage.getItem('portfolio_auth') !== 'true') {
      authGate.classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    } else {
      authGate.classList.add('hidden');
      init();
    }

    function init() {
      generateDotBackground();
      buildList();
      handleRoute();
      window.addEventListener('popstate', handleRoute);
    }

    // ── Dot background ──────────────────────────
    function generateDotBackground() {
      const svg = document.getElementById('dot-bg-svg');
      const cx = 800, cy = 800;
      const spacing = 128;
      const dotR = 36;
      const gridR = 760;
      let markup = '';
      const steps = Math.ceil(gridR / spacing);
      for (let row = -steps; row <= steps; row++) {
        for (let col = -steps; col <= steps; col++) {
          const x = cx + col * spacing;
          const y = cy + row * spacing;
          const d = Math.sqrt((x - cx) ** 2 + (y - cy) ** 2);
          if (d + dotR <= gridR) {
            markup += `<circle cx="${x}" cy="${y}" r="${dotR}" fill="#ebebeb"/>`;
          }
        }
      }
      svg.innerHTML = markup;
    }

    // ── Build list rows ──────────────────────────
    function buildList() {
      const track = document.getElementById('list-track');
      track.innerHTML = projects.map((p, i) => `
        <div class="project-row ${i === 0 ? 'row-featured' : ''}"
          data-slug="${p.slug}"
          data-thumb="${p.thumbnail}"
          tabindex="0"
          role="button"
          aria-label="${(p.gridTitle || p.title).replace(/"/g, '&quot;')}">
          <div class="row-eyebrow">${p.subtitle || p.company}</div>
          <div class="row-title">${p.gridTitle || p.title}</div>
          <svg class="row-arrow-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14"/><path d="M12 5l7 7-7 7"/>
          </svg>
        </div>
      `).join('');

      // Attach event listeners to rows (avoids HTML-attribute escaping issues)
      track.querySelectorAll('.project-row').forEach(row => {
        const slug  = row.dataset.slug;
        const thumb = row.dataset.thumb;
        const title = row.querySelector('.row-title').textContent;

        row.addEventListener('click', () => {
          window.navigateToProject(slug);
        });
        row.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            window.navigateToProject(slug);
          }
        });
        row.addEventListener('mouseenter', () => {
          window.onRowHover(thumb, title);
        });
        row.addEventListener('mouseleave', () => {
          window.onRowLeave();
        });
      });

      updateArrows();
    }

    // ── Gallery navigation ───────────────────────
    function totalPages() { return Math.ceil(projects.length / PAGE_SIZE); }

    window.galleryNext = function() {
      if (galleryPage >= totalPages() - 1) return;
      galleryPage++;
      updateTrack();
      updateArrows();
    };

    window.galleryPrev = function() {
      if (galleryPage <= 0) return;
      galleryPage--;
      updateTrack();
      updateArrows();
    };

    function updateTrack() {
      const track = document.getElementById('list-track');
      track.style.transform = `translateY(-${galleryPage * PAGE_SIZE * ROW_HEIGHT}px)`;
      // Update "featured" class to the top visible row
      const rows = track.querySelectorAll('.project-row');
      rows.forEach((r, i) => r.classList.toggle('row-featured', i === galleryPage * PAGE_SIZE));
    }

    function updateArrows() {
      document.getElementById('arrow-up').classList.toggle('disabled', galleryPage === 0);
      document.getElementById('arrow-down').classList.toggle('disabled', galleryPage >= totalPages() - 1);
    }

    // ── Hover interactions ───────────────────────
    window.onRowHover = function(thumbSrc, altText) {
      clearTimeout(hoverTimeout);
      const card  = document.getElementById('featured-card');
      const img   = document.getElementById('featured-img');
      img.src = thumbSrc;
      img.alt = altText;
      card.classList.add('visible');
    };

    window.onRowLeave = function() {
      hoverTimeout = setTimeout(() => {
        const card = document.getElementById('featured-card');
        card.classList.remove('visible');
        // Don't clear src so there's no flicker if they re-hover the same row
      }, 80);
    };

    // ── Routing ──────────────────────────────────
    function handleRoute() {
      const path  = window.location.pathname.replace(/\/$/, '');
      const parts = path.split('/').filter(Boolean);
      if (parts.length >= 3 && parts[0] === 'experience' && parts[1] === 'portfolio') {
        const project = projects.find(p => p.slug === parts[2]);
        if (project) { showCaseStudy(project); return; }
      }
      showGallery();
    }

    function showGallery() {
      currentSlug = null;
      document.getElementById('gallery-view').classList.add('active');
      document.getElementById('case-study-view').classList.remove('active');
      document.title = 'Portfolio — davidmccrindle';

      navbar.classList.remove('cs-mode');
      navbar.classList.add('gallery-mode');
      mobileMenu.classList.remove('cs-mob');
      mobileMenu.classList.add('gallery-mob');

      window.scrollTo(0, 0);
    }

    // ── Case study ───────────────────────────────
    function showCaseStudy(project) {
      currentSlug = project.slug;
      document.getElementById('gallery-view').classList.remove('active');
      document.getElementById('case-study-view').classList.add('active');

      navbar.classList.remove('cs-mode', 'hero-mode', 'scrolled');
      navbar.classList.add('gallery-mode');
      mobileMenu.classList.remove('cs-mob');
      mobileMenu.classList.add('gallery-mob');

      document.getElementById('cs-hero-img').src = project.thumbnail;
      document.getElementById('cs-hero-img').alt = project.title;
      document.getElementById('cs-company').textContent = project.company;
      document.getElementById('cs-title').textContent = project.title;
      document.getElementById('cs-subtitle').textContent = project.subtitle;
      document.getElementById('cs-tags').innerHTML = project.tags.map(t => `<span class="cs-tag">${t}</span>`).join('');
      document.title = project.title + ' — davidmccrindle';

      const { lead, sections } = parseContent(project.content);
      document.getElementById('cs-lead-text').textContent = lead;

      const accordion = document.getElementById('cs-accordion');
      const panel     = document.getElementById('cs-panel');

      accordion.innerHTML = sections.map((s, i) => `
        <div class="accordion-item ${i === 0 ? 'active' : ''}" onclick="selectSection(${i})" data-idx="${i}">
          <span class="accordion-title">${s.title}</span>
          <svg class="accordion-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </div>
      `).join('');

      panel.innerHTML = sections.map((s, i) => {
        const isOutcomes = /outcomes|impact/i.test(s.title);
        let inner = '';
        if (isOutcomes) {
          const allText = s.items.map(h => { const d = new DOMParser().parseFromString(h, 'text/html'); return d.body.textContent.trim(); }).join(' ');
          const bullets = allText.split(/(?<=[.!?])\s+(?=[A-Z])/g).filter(b => b.trim().length > 10);
          inner = `<ul class="outcomes-list">${bullets.map(b => `<li>${b.replace(/\.$/, '')}</li>`).join('')}</ul>`;
        } else {
          inner = s.items.map(h => {
            if (h.startsWith('<h3')) { const d = new DOMParser().parseFromString(h, 'text/html'); return `<h4>${d.body.textContent.trim()}</h4>`; }
            return h;
          }).join('');
        }
        return `<div class="panel-section ${i === 0 ? 'active' : ''}" data-idx="${i}"><h3>${s.title}</h3>${inner}</div>`;
      }).join('');

      buildCarousel(project.images || [project.thumbnail]);
      buildNextSection(projects[projects.findIndex(p => p.slug === project.slug) + 1] || null);

      window.scrollTo(0, 0);
      ['.cs-intro', '.cs-lead'].forEach(sel => {
        const el = document.querySelector(sel);
        if (!el) return;
        el.style.animation = 'none';
        el.offsetHeight;
        el.style.animation = '';
      });
    }

    // ── Scroll: frosted nav when scrolled (both views) ───
    window.addEventListener('scroll', () => {
      if (window.scrollY > 60) {
        navbar.classList.add('scrolled');
      } else {
        navbar.classList.remove('scrolled');
      }
    }, { passive: true });

    // ── Content parser ───────────────────────────
    function parseContent(html) {
      const doc = new DOMParser().parseFromString('<div>' + html + '</div>', 'text/html');
      const root = doc.querySelector('div');
      const sections = [];
      var lead = '', currentSection = null;
      for (const node of root.children) {
        if (node.tagName === 'H2') {
          if (currentSection) sections.push(currentSection);
          currentSection = { title: node.textContent.trim(), items: [] };
        } else if (currentSection) {
          currentSection.items.push(node.outerHTML);
        } else if (node.tagName === 'P' && !lead) {
          lead = node.textContent.trim();
        }
      }
      if (currentSection) sections.push(currentSection);
      if (!lead && sections.length > 0 && sections[0].items.length > 0) {
        const tmp = new DOMParser().parseFromString(sections[0].items[0], 'text/html');
        lead = tmp.body.textContent.trim();
      }
      return { lead, sections };
    }

    // ── Accordion ────────────────────────────────
    window.selectSection = function(idx) {
      document.querySelectorAll('.accordion-item').forEach(el => el.classList.toggle('active', +el.dataset.idx === idx));
      document.querySelectorAll('.panel-section').forEach(el => el.classList.toggle('active', +el.dataset.idx === idx));
    };

    // ── Carousel ─────────────────────────────────
    function buildCarousel(images) {
      const galleryEl = document.getElementById('cs-gallery');
      carouselImages = images;
      carouselIndex = 0;
      if (!images || images.length === 0) { galleryEl.style.display = 'none'; return; }
      galleryEl.style.display = 'block';
      const track  = document.getElementById('carousel-track');
      const dotsEl = document.getElementById('carousel-dots');
      track.innerHTML  = images.map((src, i) => `<div class="carousel-slide"><img src="${src}" alt="Project image ${i + 1}" loading="lazy"/></div>`).join('');
      dotsEl.innerHTML = images.map((_, i) => `<div class="carousel-dot ${i === 0 ? 'active' : ''}" onclick="carouselGoTo(${i})"></div>`).join('');
      updateCarouselButtons();
      track.addEventListener('scroll', () => {
        const sw = (track.querySelector('.carousel-slide')?.offsetWidth || 0) + 16;
        carouselIndex = sw ? Math.round(track.scrollLeft / sw) : 0;
        document.querySelectorAll('.carousel-dot').forEach((d, i) => d.classList.toggle('active', i === carouselIndex));
        updateCarouselButtons();
      }, { passive: true });
    }

    function updateCarouselButtons() {
      document.getElementById('carousel-prev')?.classList.toggle('disabled', carouselIndex === 0);
      document.getElementById('carousel-next')?.classList.toggle('disabled', carouselIndex >= carouselImages.length - 1);
    }

    window.carouselGoTo = function(idx) {
      const track = document.getElementById('carousel-track');
      const slide = track.querySelector('.carousel-slide');
      if (!slide) return;
      track.scrollLeft = idx * (slide.offsetWidth + 16);
      carouselIndex = idx;
      document.querySelectorAll('.carousel-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
      updateCarouselButtons();
    };
    window.carouselPrev = () => { if (carouselIndex > 0) window.carouselGoTo(carouselIndex - 1); };
    window.carouselNext = () => { if (carouselIndex < carouselImages.length - 1) window.carouselGoTo(carouselIndex + 1); };

    // ── Next project section ──────────────────────
    function buildNextSection(nextProject) {
      const el = document.getElementById('cs-next-section');
      if (!nextProject) {
        el.innerHTML = `<div class="cs-end"><p>You've reached the end of the portfolio.</p>
          <a href="#" onclick="event.preventDefault();window.navigateTo('gallery')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
            </svg>Back to all projects</a></div>`;
        return;
      }
      el.innerHTML = `
        <div class="cs-next" onclick="window.navigateToProject('${nextProject.slug}')">
          <div class="cs-next-bg" style="background-image:url('${nextProject.thumbnail}')"></div>
          <div class="cs-next-overlay"></div>
          <div class="cs-next-content">
            <p class="cs-next-label">Next Project</p>
            <p class="cs-next-title">${nextProject.title}</p>
            <span class="cs-next-cta">Check it out
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14"/><path d="M12 5l7 7-7 7"/>
              </svg>
            </span>
          </div>
        </div>`;
    }

    // ── Navigation ────────────────────────────────
    window.navigateToProject = function(slug) {
      history.pushState(null, '', '/experience/portfolio/' + slug);
      handleRoute();
    };

    window.navigateTo = function(view) {
      if (view === 'gallery') {
        history.pushState(null, '', '/experience/portfolio/');
        showGallery();
      }
    };
  </script>
